services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mordheim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: mordheim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-secret-key"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      - db
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/Dockerfile

  frontend:
    build:
      context: ./frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
        - action: rebuild
          path: ./frontend/Dockerfile

  pgweb:
    image: sosedoff/pgweb
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/mordheim?sslmode=disable
    ports:
      - "8081:8081"
    depends_on:
      - db

volumes:
  postgres_data:
  frontend_node_modules:
  backend_venv:
